<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zyno Lookalike</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

    body {
      font-family: 'Orbitron', sans-serif;
      margin: 0;
      background-color: #000;
      color: white;
      overflow: hidden;
    }

    .neon-glow::before {
      content: '';
      position: absolute;
      top: -30%;
      left: 50%;
      transform: translateX(-50%);
      width: 250%;
      height: 250%;
      background: radial-gradient(ellipse at center, #ffffffaa 0%, #3b82f6 20%, transparent 70%);
      border-radius: 50%;
      z-index: 0;
      filter: blur(100px);
      pointer-events: none;
    }

    .glass-nav {
      backdrop-filter: blur(16px);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .logo-text {
      font-size: clamp(2rem, 10vw, 8rem);
      letter-spacing: 1.2rem;
      text-align: center;
      font-weight: 700;
    }

    @media (max-width: 640px) {
      .logo-text {
        letter-spacing: 0.6rem;
      }
    }
  </style>
</head>
<body class="relative min-h-screen flex flex-col items-center justify-center neon-glow">

  <!-- Navbar -->
  <header class="fixed top-4 w-[90%] max-w-6xl z-50 glass-nav rounded-full px-6 py-3 flex justify-between items-center">
    <div class="text-sm tracking-widest text-white">ZYRO</div>
    <nav class="flex gap-6 text-sm">
      <a href="#" class="bg-white text-black rounded-full px-4 py-1">Home</a>
      <a href="#" class="text-white hover:text-gray-300">Features</a>
      <a href="#" class="text-white hover:text-gray-300">Specs</a>
    </nav>
    <div class="w-6 h-6 bg-white/10 rounded-full flex items-center justify-center text-white text-sm">☰</div>
  </header>

  <!-- Main Heading -->
  <main class="z-10 flex flex-col justify-center items-center h-screen text-white">
    <h1 class="logo-text z-10">Z Y N O</h1>
  </main>

</body>
</html>
