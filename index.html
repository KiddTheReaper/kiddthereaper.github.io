<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zyno Lookalike</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

    body {
      font-family: 'Orbitron', sans-serif;
      background-color: #000;
      color: white;
      margin: 0;
      overflow: hidden;
    }

    .glow::before {
      content: '';
      position: absolute;
      top: -30%;
      left: 50%;
      transform: translateX(-50%);
      width: 250%;
      height: 250%;
      background: radial-gradient(ellipse at center, #ffffffcc 0%, #3b82f6 20%, transparent 70%);
      border-radius: 50%;
      z-index: 0;
      filter: blur(100px);
    }

    .glass {
      backdrop-filter: blur(14px);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .logo-text {
      font-size: clamp(2rem, 10vw, 8rem);
      letter-spacing: 1.2rem;
      font-weight: 700;
      text-align: center;
    }

    @media (max-width: 640px) {
      .logo-text {
        letter-spacing: 0.6rem;
      }
    }
  </style>
</head>
<body class="relative glow min-h-screen flex flex-col">

  <!-- Navbar -->
  <header class="fixed top-4 left-1/2 transform -translate-x-1/2 w-[90%] max-w-6xl z-50">
    <div class="glass px-6 py-3 rounded-full flex justify-between items-center">
      <div class="text-sm tracking-widest text-white">ZYRO</div>

      <!-- Desktop nav -->
      <nav class="hidden md:flex gap-6 text-sm">
        <a href="#" class="bg-white text-black rounded-full px-4 py-1">Home</a>
        <a href="#" class="text-white hover:text-gray-300">Features</a>
        <a href="#" class="text-white hover:text-gray-300">Specs</a>
      </nav>

      <!-- Hamburger -->
      <div class="md:hidden flex items-center">
        <button id="menu-toggle" class="w-8 h-8 flex items-center justify-center text-white">
          ☰
        </button>
      </div>
    </div>

    <!-- Mobile menu -->
    <div id="mobile-menu" class="md:hidden hidden mt-2 glass rounded-xl p-4">
      <nav class="flex flex-col gap-4 text-sm text-white">
        <a href="#" class="bg-white text-black px-4 py-2 rounded-full w-fit">Home</a>
        <a href="#" class="hover:text-gray-300">Features</a>
        <a href="#" class="hover:text-gray-300">Specs</a>
      </nav>
    </div>
  </header>

  <!-- Main -->
  <main class="flex-grow flex justify-center items-center z-10 px-4">
    <h1 class="logo-text z-10">Z Y N O</h1>
  </main>

  <script>
    const toggle = document.getElementById('menu-toggle');
    const menu = document.getElementById('mobile-menu');

    toggle.addEventListener('click', () => {
      menu.classList.toggle('hidden');
    });
  </script>
</body>
</html>
