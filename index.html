<!DOCTYPE html>

      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
      
      body {
        font-family: 'Orbitron', sans-serif;
      }

      .glow-text {
        text-shadow: 0 0 10px rgba(0, 255, 255, 0.8),
                     0 0 20px rgba(0, 255, 255, 0.5),

    <div class="w-full max-w-screen-xl">
      <div class="flex justify-between items-center w-full">
        <span class="text-5xl sm:text-7xl md:text-8xl lg:text-9xl glow-text">K</span>
        <span class="text-5xl sm:text-7xl md:text-8xl lg:text-9xl glow-text">I</span>
        <span class="text-5xl sm:text-7xl md:text-8xl lg:text-9xl glow-text">D</span>
        <span class="text-5xl sm:text-7xl md:text-8xl lg:text-9xl glow-text">D</span>
